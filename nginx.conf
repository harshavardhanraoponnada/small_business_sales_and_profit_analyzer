# Nginx Reverse Proxy & Load Balancer Configuration
# Serves as single entry point for multiple backend instances
# Production: Use with SSL/TLS certificate termination

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Disable default config from conf.d
    # We only use our custom server block below

    # Logging format with upstream server info
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr | time: ${upstream_response_time}s';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # Upstream backend servers (configure for 1-3 instances)
    upstream infosys_backend {
        # Health check configuration (passive health check)
        server backend_1:5000 max_fails=3 fail_timeout=30s weight=1;
        server backend_2:5000 max_fails=3 fail_timeout=30s weight=1;
        server backend_3:5000 max_fails=3 fail_timeout=30s weight=1;

        # Load balancing method: least connections (best for varying request times)
        least_conn;

        # Keepalive connections to upstream
        keepalive 32;
    }

    # Upstream ML service
    # Commented out - ML service not deployed yet
    # upstream ml_service {
    #     server ml:5001 max_fails=3 fail_timeout=30s;
    #     keepalive 16;
    # }

    # HTTP redirect to HTTPS (production only)
    # Uncomment in production with valid certificate
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # Main API server
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Enable HTTP/2 in production with SSL
        # listen 443 ssl http2;
        # listen [::]:443 ssl http2;
        # ssl_certificate /etc/nginx/certs/cert.pem;
        # ssl_certificate_key /etc/nginx/certs/key.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline';" always;

        # Health check endpoint (lightweight, no auth required)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # API endpoints with general rate limiting
        location /api/ {
            # Apply general rate limit
            limit_req zone=general_limit burst=20 nodelay;

            proxy_pass http://infosys_backend;
            proxy_http_version 1.1;

            # Headers for upstream recognition
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Connection settings
            proxy_set_header Connection "upgrade";
            proxy_set_header Upgrade $http_upgrade;
            proxy_buffering off;
            proxy_request_buffering off;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Error handling
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;
        }

        # Authentication endpoints with stricter rate limiting
        location /api/auth/ {
            # Apply auth rate limit
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://infosys_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ML prediction service
        # Commented out - ML service not deployed yet
        # location /api/predict/ {
        #     # Rate limit for ML service
        #     limit_req zone=general_limit burst=10 nodelay;
        #
        #     proxy_pass http://ml_service;
        #     proxy_http_version 1.1;
        #
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #
        #     # ML service may need longer timeouts for computations
        #     proxy_connect_timeout 120s;
        #     proxy_send_timeout 120s;
        #     proxy_read_timeout 120s;
        # }

        # Static assets (if backend serves them)
        location /uploads/ {
            proxy_pass http://infosys_backend;
            proxy_http_version 1.1;

            # Cache static assets
            expires 30d;
            add_header Cache-Control "public, immutable";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Frontend (React app) - serve from separate container or backend
        location / {
            # Serve React frontend (adjust root path as needed)
            # root /usr/share/nginx/html;
            # try_files $uri $uri/ /index.html;

            # Or proxy to frontend container
            proxy_pass http://infosys_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Cache busting for HTML
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Custom error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
