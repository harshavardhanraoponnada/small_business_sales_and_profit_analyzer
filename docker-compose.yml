services:
  postgres:
    image: postgres:15-alpine
    container_name: infosys_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-infosys_app}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: infosys_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  nginx:
    image: nginx:1.25-alpine
    container_name: infosys_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend_1
      - backend_2
      - backend_3
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Backend Instance 1
  backend_1:
    image: node:20-alpine
    container_name: infosys_backend_1
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/infosys_app?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      PRISMA_QUERY_ENGINE_LIBRARY: /app/node_modules/.prisma/client/libquery_engine-linux-musl-openssl-3.0.x.so.node
      PORT: 5000
      INSTANCE_ID: backend_1
      REPORT_SCHEDULER_TIMEZONE: ${REPORT_SCHEDULER_TIMEZONE:-Asia/Kolkata}
      REPORT_SCHEDULER_INSTANCE: ${REPORT_SCHEDULER_INSTANCE:-backend_1}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm install && npm start"
    networks:
      - app-network
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Instance 2
  backend_2:
    image: node:20-alpine
    container_name: infosys_backend_2
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/infosys_app?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      PRISMA_QUERY_ENGINE_LIBRARY: /app/node_modules/.prisma/client/libquery_engine-linux-musl-openssl-3.0.x.so.node
      PORT: 5000
      INSTANCE_ID: backend_2
      REPORT_SCHEDULER_TIMEZONE: ${REPORT_SCHEDULER_TIMEZONE:-Asia/Kolkata}
      REPORT_SCHEDULER_INSTANCE: ${REPORT_SCHEDULER_INSTANCE:-backend_1}
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm install && npm start"
    networks:
      - app-network
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Instance 3
  backend_3:
    image: node:20-alpine
    container_name: infosys_backend_3
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/infosys_app?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      PRISMA_QUERY_ENGINE_LIBRARY: /app/node_modules/.prisma/client/libquery_engine-linux-musl-openssl-3.0.x.so.node
      PORT: 5000
      INSTANCE_ID: backend_3
      REPORT_SCHEDULER_TIMEZONE: ${REPORT_SCHEDULER_TIMEZONE:-Asia/Kolkata}
      REPORT_SCHEDULER_INSTANCE: ${REPORT_SCHEDULER_INSTANCE:-backend_1}
    ports:
      - "5002:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm install && npm start"
    networks:
      - app-network
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Test Runner (installs dev dependencies once)
  backend_test:
    image: node:20-alpine
    container_name: infosys_backend_test
    profiles:
      - test
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_test_node_modules:/app/node_modules
    environment:
      NODE_ENV: test
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/infosys_app?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      PRISMA_QUERY_ENGINE_LIBRARY: /app/node_modules/.prisma/client/libquery_engine-linux-musl-openssl-3.0.x.so.node
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["sh", "/app/scripts/docker-test-entrypoint.sh"]
    command: []
    networks:
      - app-network

  frontend:
    image: node:20-alpine
    container_name: infosys_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost/api
      NODE_ENV: development
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - app-network
    depends_on:
      - backend_1

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
  backend_test_node_modules:

networks:
  app-network:
    driver: bridge
